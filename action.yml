name: 'depshield'
description: 'Scan npm dependencies for supply chain attacks including typosquatting, obfuscation, and dependency confusion'
branding:
  icon: 'shield'
  color: 'blue'

inputs:
  path:
    description: 'Path to project directory to scan'
    required: false
    default: '.'
  severity:
    description: 'Minimum severity to report (low, medium, high, critical)'
    required: false
    default: 'medium'
  format:
    description: 'Output format (text, json, sarif)'
    required: false
    default: 'sarif'
  fail-on:
    description: 'Fail the action if findings >= this severity (low, medium, high, critical)'
    required: false
    default: 'high'

outputs:
  findings-count:
    description: 'Total number of findings'
  sarif-file:
    description: 'Path to SARIF output file'

runs:
  using: 'composite'
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install depshield
      run: pip install depshield
      shell: bash

    - name: Run depshield scan
      run: |
        depshield scan ${{ inputs.path }} \
          --format ${{ inputs.format }} \
          --severity ${{ inputs.severity }} \
          > depshield-results.sarif
      shell: bash

    - name: Upload SARIF results
      if: always() && inputs.format == 'sarif'
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: depshield-results.sarif
