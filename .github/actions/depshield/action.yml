name: 'depshield'
description: 'Scan npm dependencies for supply chain attacks'

inputs:
  path:
    description: 'Path to project directory to scan'
    required: false
    default: '.'
  severity:
    description: 'Minimum severity to report (low, medium, high, critical)'
    required: false
    default: 'medium'
  format:
    description: 'Output format (text, json, sarif)'
    required: false
    default: 'sarif'

runs:
  using: 'composite'
  steps:
    - name: Install depshield
      run: pip install depshield
      shell: bash

    - name: Run depshield scan
      run: depshield scan ${{ inputs.path }} --format ${{ inputs.format }} --severity ${{ inputs.severity }} > depshield-results.sarif
      shell: bash

    - name: Upload SARIF results
      uses: github/codeql-action/upload-sarif@v3
      if: inputs.format == 'sarif'
      with:
        sarif_file: depshield-results.sarif
